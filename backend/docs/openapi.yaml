openapi: 3.0.3
info:
  title: Promo Zone API
  version: 1.0.0
servers:
  - url: https://api.promozone.example
paths:
  /api/auth/register:
    post:
      summary: Register and get bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '201': { description: Registered }
  /api/auth/login:
    post:
      summary: Login and get bearer token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: Logged in }
  /api/auth/me:
    get:
      summary: Current authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: User info }
  /api/auth/logout:
    post:
      summary: Invalidate current token
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Logged out }
  /api/auth/sync-profile:
    post:
      summary: Sync role and onboarding profile into Laravel MySQL
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName, role]
              properties:
                displayName: { type: string }
                phone: { type: string }
                role: { type: string, enum: [creator, business, admin] }
                email: { type: string }
                bio: { type: string }
                niches:
                  type: array
                  items: { type: string }
                companyName: { type: string }
      responses:
        '200': { description: Synced }
  /api/uploads:
    post:
      summary: Upload media file
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                folder:
                  type: string
      responses:
        '201': { description: Uploaded }
  /api/campaigns:
    get:
      summary: List published campaigns
      parameters:
        - in: query
          name: platform
          schema: { type: string }
        - in: query
          name: minPayout
          schema: { type: integer }
        - in: query
          name: maxPayout
          schema: { type: integer }
      responses:
        '200': { description: Campaign list }
    post:
      summary: Create campaign
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /api/ai/campaign-brief:
    post:
      summary: Generate an editable campaign brief with GPT-5.6
      description: >
        Business-only advisory endpoint. Platform, target views, payout,
        creator count, and brand mention are preserved from the request after
        model generation. It never creates or publishes a campaign.
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignBriefRequest'
      responses:
        '200':
          description: Structured campaign suggestion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiCampaignBriefEnvelope'
        '403':
          description: Authenticated user is not a business
        '422':
          description: Invalid campaign context
        '429':
          description: AI rate limit exceeded
        '502':
          description: AI service temporarily unavailable
        '503':
          description: AI is not configured on the server
  /api/ai/campaigns/{campaignId}/creator-coach:
    post:
      summary: Review a creator draft against a live campaign with GPT-5.6
      description: >
        Creator-only coaching endpoint. Laravel loads the published campaign
        and relevant authenticated creator profile. The response is advisory
        and cannot approve work or move funds.
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: campaignId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatorCoachRequest'
      responses:
        '200':
          description: Structured creator coaching
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiCreatorCoachEnvelope'
        '403':
          description: Authenticated user is not a creator
        '404':
          description: Published campaign not found
        '422':
          description: Draft is invalid
        '429':
          description: AI rate limit exceeded
        '502':
          description: AI service temporarily unavailable
        '503':
          description: AI is not configured on the server
  /api/campaigns/{campaignId}/apply:
    post:
      summary: Creator apply to campaign
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: campaignId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201': { description: Applied }
  /api/campaigns/{campaignId}/applications/{applicationId}/approve:
    post:
      summary: Approve creator and create hold
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: campaignId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: applicationId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Approved }
  /api/campaigns/{campaignId}/applications/{applicationId}/approve-proof:
    post:
      summary: Approve proof and payout
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Paid }
  /api/applications/{applicationId}/submissions:
    post:
      summary: Submit sample or proof
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, enum: [sample, proof] }
                message: { type: string }
                mediaUrls:
                  type: array
                  items: { type: string }
                postUrl: { type: string }
                screenshots:
                  type: array
                  items: { type: string }
                declaredViews: { type: integer }
      responses:
        '201': { description: Submission created }
  /api/wallet:
    get:
      summary: Get wallet and ledger
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Wallet payload }
  /api/wallet/deposit:
    post:
      summary: Simulated deposit
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Deposited }
  /api/wallet/withdraw-request:
    post:
      summary: Creator withdraw request placeholder
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Request created }
  /api/holds/refund:
    post:
      summary: Refund active hold
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Refunded }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    CampaignBriefRequest:
      type: object
      additionalProperties: false
      required:
        - productName
        - productDescription
        - audience
        - campaignGoal
        - platform
        - tone
        - targetViews
        - payoutAmountGhs
        - creatorsNeeded
      properties:
        productName:
          type: string
          maxLength: 120
        productDescription:
          type: string
          minLength: 20
          maxLength: 1500
        audience:
          type: string
          minLength: 3
          maxLength: 500
        campaignGoal:
          type: string
          minLength: 3
          maxLength: 500
        platform:
          type: string
          enum: [TikTok, Instagram, YouTube, X]
        tone:
          type: string
          maxLength: 120
        targetViews:
          type: integer
          minimum: 1
          maximum: 1000000000
        payoutAmountGhs:
          type: integer
          minimum: 1
          maximum: 100000000
        creatorsNeeded:
          type: integer
          minimum: 1
          maximum: 10000
        brandMention:
          type: string
          nullable: true
          maxLength: 120
    AiContentAngle:
      type: object
      additionalProperties: false
      required: [hook, concept]
      properties:
        hook: { type: string }
        concept: { type: string }
    CampaignBriefData:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - platform
        - target_views
        - payout_amount_ghs
        - creators_needed
        - mention
        - hashtags
        - do_dont
        - creator_profile
        - success_metric
        - content_angles
      properties:
        title: { type: string }
        description: { type: string }
        platform: { type: string }
        target_views: { type: integer }
        payout_amount_ghs: { type: integer }
        creators_needed: { type: integer }
        mention: { type: string }
        hashtags:
          type: array
          items: { type: string }
        do_dont: { type: string }
        creator_profile: { type: string }
        success_metric: { type: string }
        content_angles:
          type: array
          items:
            $ref: '#/components/schemas/AiContentAngle'
    AiUsage:
      type: object
      required: [input_tokens, output_tokens, total_tokens]
      properties:
        input_tokens: { type: integer, minimum: 0 }
        output_tokens: { type: integer, minimum: 0 }
        total_tokens: { type: integer, minimum: 0 }
    AiGenerationMeta:
      type: object
      required:
        - provider
        - requested_model
        - model
        - feature
        - generated_at
        - usage
      properties:
        provider:
          type: string
          example: OpenAI
        requested_model:
          type: string
          example: gpt-5.6
        model:
          type: string
          example: gpt-5.6-sol
        response_id:
          type: string
          nullable: true
        feature:
          type: string
          enum: [campaign_architect, creator_coach]
        generated_at:
          type: string
          format: date-time
        usage:
          $ref: '#/components/schemas/AiUsage'
    AiCampaignBriefEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/CampaignBriefData'
        meta:
          $ref: '#/components/schemas/AiGenerationMeta'
    CreatorCoachRequest:
      type: object
      additionalProperties: false
      required: [draft]
      properties:
        draft:
          type: string
          minLength: 20
          maxLength: 5000
    AiChecklistItem:
      type: object
      additionalProperties: false
      required: [requirement, status, evidence]
      properties:
        requirement: { type: string }
        status:
          type: string
          enum: [met, partial, missing]
        evidence: { type: string }
    CreatorCoachData:
      type: object
      additionalProperties: false
      required:
        - score
        - verdict
        - summary
        - strengths
        - missing_requirements
        - risk_flags
        - recommended_hook
        - revised_draft
        - shot_list
        - checklist
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        verdict:
          type: string
          enum: [ready, revise, off_brief]
        summary: { type: string }
        strengths:
          type: array
          items: { type: string }
        missing_requirements:
          type: array
          items: { type: string }
        risk_flags:
          type: array
          items: { type: string }
        recommended_hook: { type: string }
        revised_draft: { type: string }
        shot_list:
          type: array
          items: { type: string }
        checklist:
          type: array
          items:
            $ref: '#/components/schemas/AiChecklistItem'
    AiCreatorCoachEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: '#/components/schemas/CreatorCoachData'
        meta:
          $ref: '#/components/schemas/AiGenerationMeta'
