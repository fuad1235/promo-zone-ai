[program:promozone-worker]
process_name=%(program_name)s_%(process_num)02d
command=/usr/bin/php /var/www/promozone/backend/artisan queue:work --sleep=3 --tries=3 --max-time=3600 --queue=default
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=1
redirect_stderr=true
stdout_logfile=/var/log/supervisor/promozone-worker.log
stopwaitsecs=3600
